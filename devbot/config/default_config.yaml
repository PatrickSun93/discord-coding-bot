# DevBot default configuration (v4)
# Copy to the config dir shown by: python -c "import platformdirs; print(platformdirs.user_config_dir('devbot'))"
# and fill in your values.

# ── Messaging ────────────────────────────────────────
discord:
  token: "${DISCORD_BOT_TOKEN}"
  owner_id: "${DISCORD_OWNER_ID}"
  channel_id: "" # optional: restrict to one channel ID, leave empty for all

# ── LLM Router ───────────────────────────────────────
llm:
  primary:
    provider: "minimax"
    base_url: "https://api.minimaxi.com/anthropic"
    api_key: "${MINIMAX_API_KEY}"
    model: "MiniMax-M2.7"
  fallback:
    provider: "ollama"
    base_url: "http://localhost:11434/v1"
    model: "qwen3.5:4b" # run: ollama pull qwen3.5:4b

# ── CLI Agents ───────────────────────────────────────
cli:
  claude_code:
    command: "claude"
    base_args: ["-p", "--output-format", "stream-json"]
    autonomy_args: ["--dangerously-skip-permissions"]
    extra_args: []
    timeout: 600
    enabled: true
    roles: ["coder"]

  codex:
    command: "codex"
    base_args: ["exec", "--json"]
    autonomy_args: ["--full-auto"]
    extra_args: ["--skip-git-repo-check"]
    timeout: 600
    enabled: true
    roles: ["coder"]

  gemini_cli:
    command: "gemini"
    base_args: ["-p", "--output-format", "stream-json"]
    autonomy_args: ["--yolo"]
    extra_args: []
    timeout: 600
    enabled: true
    roles: ["reviewer", "tester"]

  qwen_cli:
    command: "qwen"
    base_args: ["-p", "--output-format", "stream-json"]
    autonomy_args: ["--yolo"]
    extra_args: []
    timeout: 600
    enabled: true
    roles: ["reviewer"]

# ── Shell ────────────────────────────────────────────
shell:
  default: "auto" # auto | bash | zsh | wsl | powershell | cmd
  timeout: 300
  wsl_distro: null # specific WSL distro, or null for default

# ── Todo Queue ───────────────────────────────────────
todo:
  file: "~/.devbot/todos.md"
  done_file: "~/.devbot/done.md"
  auto_start: false
  busy_cli_timeout: 300

# ── Feature Pipeline ─────────────────────────────────
pipeline:
  coder: "" # optional explicit coder CLI; otherwise role-based selection
  reviewers: [] # optional explicit reviewers; otherwise role-based selection
  tester: "" # optional explicit QA/test-analysis CLI
  test_command: "" # optional global default test command
  lint_command: "" # optional global default lint/smoke command
  max_cycles: 10
  auto_pr: true
  pr_tool: "gh"
  base_branch: "main"
  plan_threshold: "complex" # always | complex | never
  push_remote: "origin"

# ── Services (managed via shell) ─────────────────────
